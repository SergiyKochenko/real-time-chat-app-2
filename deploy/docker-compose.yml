version: "3.8"
services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    image: chat-backend:latest
    ports:
      - "5000:5000"
    environment:
      - MONGO_DB_URI=${MONGO_DB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - mongo

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    image: chat-frontend:latest
    ports:
      - "80:80"

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
