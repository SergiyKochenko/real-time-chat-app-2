name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev/staging/prod)"
        required: true
      image_tag:
        description: "Image tag to deploy (e.g., v1.0.0)"
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.environment }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: real-time-chat-backend
  IMAGE_FRONTEND: real-time-chat-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Set up Kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "KUBE_CONFIG secret not configured for this environment" >&2
            exit 1
          fi
          echo "$KUBE_CONFIG" > kubeconfig.yaml

      - name: Compute image references
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          echo "BACKEND_IMAGE=${REGISTRY}/${GITHUB_REPOSITORY_OWNER}/${IMAGE_BACKEND}:${IMAGE_TAG}" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=${REGISTRY}/${GITHUB_REPOSITORY_OWNER}/${IMAGE_FRONTEND}:${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Update image tags in manifest
        run: |
          sed -i "s|<your-registry>/chat-backend:latest|${BACKEND_IMAGE}|g" docs/deployment-manifest-example.yaml
          sed -i "s|<your-registry>/chat-frontend:latest|${FRONTEND_IMAGE}|g" docs/deployment-manifest-example.yaml

      - name: Deploy to Kubernetes
        run: kubectl --kubeconfig=kubeconfig.yaml apply -f docs/deployment-manifest-example.yaml

      - name: Wait for rollout (backend)
        run: kubectl --kubeconfig=kubeconfig.yaml rollout status deployment/chat-backend --timeout=60s || kubectl --kubeconfig=kubeconfig.yaml rollout undo deployment/chat-backend

      - name: Wait for rollout (frontend)
        run: kubectl --kubeconfig=kubeconfig.yaml rollout status deployment/chat-frontend --timeout=60s || kubectl --kubeconfig=kubeconfig.yaml rollout undo deployment/chat-frontend

      - name: Smoke test service connectivity
        run: |
          kubectl --kubeconfig=kubeconfig.yaml run smoke-probe --rm -i --restart=Never --image=busybox:1.36 -- sh -c "
            nc -zvw3 chat-backend 5000 &&
            nc -zvw3 chat-frontend 80
          "
