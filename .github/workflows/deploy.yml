name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (dev/staging/prod)'
        required: true
      image_tag:
        description: 'Image tag to deploy (e.g., v1.0.0)'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set up Kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "KUBE_CONFIG secret not configured for this environment" >&2
            exit 1
          fi
          echo "$KUBE_CONFIG" > kubeconfig.yaml

      - name: Update image tags in manifest
        env:
          DOCKER_REPO: ${{ secrets.DOCKER_REPO }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          sed -i "s|<your-registry>/chat-backend:latest|$DOCKER_REPO/chat-backend:$IMAGE_TAG|g" docs/deployment-manifest-example.yaml
          sed -i "s|<your-registry>/chat-frontend:latest|$DOCKER_REPO/chat-frontend:$IMAGE_TAG|g" docs/deployment-manifest-example.yaml

      - name: Deploy to Kubernetes
        run: kubectl --kubeconfig=kubeconfig.yaml apply -f docs/deployment-manifest-example.yaml
