name: Release Build

on:
  push:
    tags:
      - name: Build backend Docker image
        run: docker build -t ${{ secrets.DOCKER_REPO }}/chat-backend:${{ env.VERSION_TAG }} -f backend/Dockerfile .

      - name: Build frontend Docker image
        run: docker build -t ${{ secrets.DOCKER_REPO }}/chat-frontend:${{ env.VERSION_TAG }} -f frontend/Dockerfile .

      - name: Login to Docker registry
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Push backend Docker image
        run: docker push ${{ secrets.DOCKER_REPO }}/chat-backend:${{ env.VERSION_TAG }}

      - name: Push frontend Docker image
        run: docker push ${{ secrets.DOCKER_REPO }}/chat-frontend:${{ env.VERSION_TAG }}
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (vX.Y.Z) when manually triggering'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION_TAG: ${{ github.ref_name || inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Package frontend artifact
        run: |
          tar -czf frontend-dist.tar.gz -C frontend dist

      - name: Package backend source
        run: |
          tar -czf backend-src.tar.gz backend package.json package-lock.json

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            frontend-dist.tar.gz
            backend-src.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
