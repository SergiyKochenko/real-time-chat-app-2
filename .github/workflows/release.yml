name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (vX.Y.Z) when manually triggering"
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: real-time-chat-backend
  IMAGE_FRONTEND: real-time-chat-frontend

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      VERSION_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure version tag is present
        run: |
          if [ -z "${VERSION_TAG}" ]; then
            echo "VERSION_TAG is required (tag push or workflow_dispatch input)." >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies (root)
        run: npm ci

      - name: Install dependencies (frontend)
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Package frontend artifact
        run: tar -czf frontend-dist.tar.gz -C frontend dist

      - name: Package backend source
        run: tar -czf backend-src.tar.gz backend package.json package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_BACKEND }}:${{ env.VERSION_TAG }}
          provenance: false
          sbom: false

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_FRONTEND }}:${{ env.VERSION_TAG }}
          provenance: false
          sbom: false

      - name: Generate SBOMs for images
        uses: anchore/sbom-action/download-syft@v0.17.1

      - name: Create backend SBOM
        run: syft ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_BACKEND }}:${{ env.VERSION_TAG }} -o cyclonedx-json > sbom-backend.json

      - name: Create frontend SBOM
        run: syft ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_FRONTEND }}:${{ env.VERSION_TAG }} -o cyclonedx-json > sbom-frontend.json

      - name: Upload release artifacts and generate release notes
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            frontend-dist.tar.gz
            backend-src.tar.gz
            sbom-backend.json
            sbom-frontend.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
