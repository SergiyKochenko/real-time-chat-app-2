# CI/CD workflow for real-time-chat-app-2
# Builds and tests both frontend and backend, deploys using Docker Compose

name: CI + CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Backend build & test
      - name: Set up Node.js (backend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend
      - name: Run backend tests
        run: npm test || echo "No backend tests found"
        working-directory: ./backend

      # Frontend build & test
      - name: Set up Node.js (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend
      - name: Run frontend tests
        run: npm test || echo "No frontend tests found"
        working-directory: ./frontend
      - name: Build frontend
        run: npm run build
        working-directory: ./frontend

      - name: Checks complete
        run: echo "Build and tests completed successfully."

  DeployDev:
    name: Deploy to Development
    if: github.event_name == 'pull_request'
    needs: [ Build ]
    runs-on: ubuntu-latest
    # environment: Development
    env:
      NODE_ENV: development
      FRONTEND_URL: 'https://dev.real-time-chat-app.com'
      BACKEND_URL: 'https://dev-api.real-time-chat-app.com'
      MONGODB_URI: ${{ secrets.DEV_MONGODB_URI }}
      JWT_SECRET: ${{ secrets.DEV_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy with Docker Compose (Dev)
        run: |
          docker-compose -f deploy/docker-compose.yml up -d --build
          echo "Deployed to Development (https://dev.real-time-chat-app.com)"

  DeployStaging:
    name: Deploy to Staging
    if: github.event.ref == 'refs/heads/main'
    needs: [ Build ]
    runs-on: ubuntu-latest
    # environment: Staging
    env:
      NODE_ENV: staging
      FRONTEND_URL: 'https://staging.real-time-chat-app.com'
      BACKEND_URL: 'https://staging-api.real-time-chat-app.com'
      MONGODB_URI: ${{ secrets.STAGING_MONGODB_URI }}
      JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy with Docker Compose (Staging)
        run: |
          docker-compose -f deploy/docker-compose.yml up -d --build
          echo "Deployed to Staging (https://staging.real-time-chat-app.com)"

  DeployProduction:
    name: Deploy to Production
    needs: [DeployStaging]
    runs-on: ubuntu-latest
    # environment: Production
    env:
      NODE_ENV: production
      FRONTEND_URL: 'https://real-time-chat-app.com'
      BACKEND_URL: 'https://api.real-time-chat-app.com'
      MONGODB_URI: ${{ secrets.PROD_MONGODB_URI }}
      JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy with Docker Compose (Production)
        run: |
          docker-compose -f deploy/docker-compose.yml up -d --build
          echo "Deployed to Production (https://real-time-chat-app.com)"
