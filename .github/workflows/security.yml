name: Security Scans

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >
            p/ci

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --verbose

  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          format: table
          exit-code: 1

  sbom-and-image-scan:
    runs-on: ubuntu-latest
    needs: [semgrep, gitleaks, trivy]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for scanning
        run: |
          docker build -f backend/Dockerfile -t local/chat-backend:${{ github.run_id }} .

      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action/download-syft@v0.17.1
      - run: syft local/chat-backend:${{ github.run_id }} -o cyclonedx-json > sbom-backend.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-backend
          path: sbom-backend.json
          if-no-files-found: error

      - name: Trivy image scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: local/chat-backend:${{ github.run_id }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: 1
          vuln-type: os,library
